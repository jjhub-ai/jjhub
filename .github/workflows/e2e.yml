name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: CLI E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jjhub
          POSTGRES_PASSWORD: jjhub
          POSTGRES_DB: jjhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jjhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      JJHUB_DB_HOST: localhost
      JJHUB_DB_PORT: "5432"
      JJHUB_DB_NAME: jjhub
      JJHUB_DB_USER: jjhub
      JJHUB_DB_PASSWORD: jjhub
      JJHUB_PORT: "3000"
      JJHUB_DATA_DIR: /tmp/jjhub-data
      JJHUB_WRITE_TOKEN: jjhub_deadbeefdeadbeefdeadbeefdeadbeefdeadbeef
      JJHUB_READ_TOKEN: jjhub_feedfacefeedfacefeedfacefeedfacefeedface

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize DB schema
        run: psql -h localhost -U jjhub -d jjhub -f db/schema.sql
        env:
          PGPASSWORD: jjhub

      - name: Start server
        run: |
          bun run dev &
          # Wait for server health check
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Run CLI E2E tests
        run: bun test e2e/cli/
