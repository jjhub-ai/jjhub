  /user/gpg-keys:
    get:
      summary: GET /user/gpg-keys
      description: List GPG keys for the authenticated user. These keys are used to verify commit signatures.
      operationId: get_user_gpg_keys
      tags:
        - User
      responses:
        '200':
          description: List of GPG keys
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    primary_key_id:
                      type: string
                    key_id:
                      type: string
                    public_key:
                      type: string
                    emails:
                      type: array
                      items:
                        type: object
                        properties:
                          email:
                            type: string
                          verified:
                            type: boolean
                    can_sign:
                      type: boolean
                    verified:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time
              example:
                - id: 1
                  primary_key_id: "3DE1A1B4D3A8C5F2"
                  key_id: "3DE1A1B4D3A8C5F2"
                  emails:
                    - email: alice@example.com
                      verified: true
                  can_sign: true
                  verified: true
                  created_at: "2026-03-06T12:00:00Z"
        '401':
          description: Authentication required
    post:
      summary: POST /user/gpg-keys
      description: Upload a new GPG public key for commit signature verification. The key must be in ASCII-armored format.
      operationId: post_user_gpg_keys
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - armored_public_key
              properties:
                armored_public_key:
                  type: string
                  description: ASCII-armored GPG public key
            example:
              armored_public_key: "-----BEGIN PGP PUBLIC KEY BLOCK-----\n...\n-----END PGP PUBLIC KEY BLOCK-----"
      responses:
        '201':
          description: GPG key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  primary_key_id:
                    type: string
                  key_id:
                    type: string
                  public_key:
                    type: string
                  emails:
                    type: array
                    items:
                      type: object
                      properties:
                        email:
                          type: string
                        verified:
                          type: boolean
                  can_sign:
                    type: boolean
                  verified:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
        '401':
          description: Authentication required
        '422':
          description: Invalid key format or key already associated with another account
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: Validation Failed
                errors:
                  - resource: GPGKey
                    field: armored_public_key
                    code: invalid
