components:
  schemas:
    AgentSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        title:
          type: string
        status:
          type: string
          enum: [active, completed, failed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AgentMessage:
      type: object
      properties:
        id:
          type: integer
          format: int64
        session_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system, tool]
        sequence:
          type: integer
          format: int64
        parts:
          type: array
          items:
            $ref: '#/components/schemas/AgentMessagePart'
        created_at:
          type: string
          format: date-time
    AgentMessagePart:
      type: object
      properties:
        part_index:
          type: integer
          format: int64
        type:
          type: string
          enum: [text, tool_call, tool_result, done]
        content:
          description: Message part payload.
    WorkspaceSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        repository_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, running, stopped, failed]
        cols:
          type: integer
        rows:
          type: integer
        idle_timeout_secs:
          type: integer
        last_activity_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkspaceSSHConnectionInfo:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        vm_id:
          type: string
        host:
          type: string
          example: vm-ssh.jjhub.tech
        ssh_host:
          type: string
          example: vm_abc123+developer@vm-ssh.jjhub.tech
        username:
          type: string
          example: developer
        port:
          type: integer
          example: 22
        access_token:
          type: string
        command:
          type: string
          example: ssh vm_abc123+developer:ws_xxx@vm-ssh.jjhub.tech
    Workspace:
      type: object
      properties:
        id:
          type: string
          description: Unique workspace identifier
          example: ws_abc123
        repository_id:
          type: integer
          format: int64
          description: Repository this workspace belongs to
        user_id:
          type: integer
          format: int64
          description: User who owns the workspace
        name:
          type: string
          description: Human-readable workspace name
          example: primary
        status:
          type: string
          enum: [pending, starting, running, suspended, stopped, failed]
          description: Current workspace status
          example: running
        is_fork:
          type: boolean
          description: Whether this workspace was forked from another workspace
        parent_workspace_id:
          type: string
          nullable: true
          description: Source workspace ID for forked workspaces
        freestyle_vm_id:
          type: string
          description: VM identifier
          example: vm-xyz789
        persistence:
          type: string
          enum: [sticky, ephemeral, persistent]
          description: Workspace persistence level
          example: sticky
        ssh_host:
          type: string
          nullable: true
          description: SSH connection host
          example: vm-xyz789@vm-ssh.jjhub.tech
        snapshot_id:
          type: string
          nullable: true
          description: Snapshot template used to create this workspace
          example: snap_def456
        idle_timeout_seconds:
          type: integer
          description: Seconds of inactivity before auto-suspend
          example: 1800
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        suspended_at:
          type: string
          format: date-time
          nullable: true
          description: When the workspace was suspended (null if running)
    WorkspaceSnapshot:
      type: object
      properties:
        id:
          type: string
          description: Unique snapshot identifier
          example: snap_def456
        repository_id:
          type: integer
          format: int64
          description: Repository this snapshot belongs to
        user_id:
          type: integer
          format: int64
          description: User who created the snapshot
        name:
          type: string
          description: Human-readable snapshot name
          example: node20-full-stack
        workspace_id:
          type: string
          nullable: true
          description: Workspace this snapshot was taken from (null for base templates)
          example: ws_abc123
        freestyle_snapshot_id:
          type: string
          description: Platform snapshot identifier
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    Webhook:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique webhook identifier
        type:
          type: string
          description: Webhook type (e.g., "jjhub", "slack", "discord")
          example: jjhub
        url:
          type: string
          format: uri
          description: The delivery URL
        config:
          type: object
          properties:
            content_type:
              type: string
              enum: [json, form]
              description: Payload content type
            url:
              type: string
              format: uri
              description: The delivery URL
          description: Webhook configuration
        events:
          type: array
          items:
            type: string
          description: List of subscribed event names
          example: ["push", "landing_request"]
        active:
          type: boolean
          description: Whether the webhook is active
        last_status:
          type: string
          enum: [none, succeed, fail]
          description: Status of the last delivery attempt
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateHookOption:
      type: object
      required:
        - type
        - config
        - events
      properties:
        type:
          type: string
          description: Webhook type
          example: jjhub
        config:
          type: object
          required:
            - url
            - content_type
          properties:
            url:
              type: string
              format: uri
              description: Delivery URL (must be HTTPS in production)
            content_type:
              type: string
              enum: [json, form]
              default: json
            secret:
              type: string
              description: HMAC-SHA256 signing secret
        events:
          type: array
          items:
            type: string
          description: Event names to subscribe to
          example: ["push", "landing_request"]
        active:
          type: boolean
          default: true
          description: Whether the webhook is active upon creation
    EditHookOption:
      type: object
      properties:
        config:
          type: object
          properties:
            url:
              type: string
              format: uri
              description: New delivery URL
            content_type:
              type: string
              enum: [json, form]
            secret:
              type: string
              description: New HMAC-SHA256 signing secret
        events:
          type: array
          items:
            type: string
          description: New event names to subscribe to
        active:
          type: boolean
          description: Enable or disable the webhook
    HookDelivery:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique delivery identifier
        status:
          type: string
          enum: [succeed, fail]
          description: Delivery outcome
        status_code:
          type: integer
          description: HTTP response status code from the target
        event:
          type: string
          description: Event type that triggered this delivery
        delivered_at:
          type: string
          format: date-time
          description: When the delivery was attempted
        duration_ms:
          type: integer
          description: Round-trip time in milliseconds
        request:
          type: object
          properties:
            url:
              type: string
              format: uri
            headers:
              type: object
              additionalProperties:
                type: string
          description: Request details (URL and headers)
        response:
          type: object
          properties:
            status_code:
              type: integer
            body:
              type: string
          description: Response details (status code and body)
