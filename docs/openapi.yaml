          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a previous response's next_cursor field
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of results to return (default 30, max 100)
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        '200':
          description: Successful response
          headers:
            Link:
              description: RFC 8288 pagination links with cursor-based URLs.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - next_cursor
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        change_id:
                          type: string
                        commit_id:
                          type: string
                        description:
                          type: string
                        author_name:
                          type: string
                        author_email:
                          type: string
                        timestamp:
                          type: string
                        has_conflict:
                          type: boolean
                        is_empty:
                          type: boolean
                        parent_change_ids:
                          type: array
                          items:
                            type: string
                  next_cursor:
                    type: string
                    nullable: true
                    description: Opaque cursor for fetching the next page. Null when there are no more results.
