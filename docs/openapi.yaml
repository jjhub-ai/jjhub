  /repos/{owner}/{repo}/landings/{number}/suggestions:
    get:
      summary: GET /repos/{owner}/{repo}/landings/{number}/suggestions
      description: List suggested changes on a landing request. Suggestions are inline code proposals created by reviewers that the author can accept or reject.
      operationId: get_repos__owner___repo__landings__number__suggestions
      tags:
        - Landings
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
        - name: number
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, rejected]
          description: Filter by suggestion status
      responses:
        '200':
          description: List of suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    landing_number:
                      type: integer
                    author:
                      type: object
                      properties:
                        login:
                          type: string
                        id:
                          type: integer
                    body:
                      type: string
                      description: Review comment text accompanying the suggestion
                    path:
                      type: string
                      description: File path the suggestion applies to
                    start_line:
                      type: integer
                      description: First line number being replaced
                    end_line:
                      type: integer
                      description: Last line number being replaced
                    suggestion:
                      type: string
                      description: Replacement code content
                    status:
                      type: string
                      enum: [pending, accepted, rejected]
                    change_id:
                      type: string
                      nullable: true
                      description: Change ID of the change created when the suggestion was accepted
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
              example:
                - id: 7
                  landing_number: 42
                  author:
                    login: reviewer
                    id: 2
                  body: The error message should be more descriptive.
                  path: internal/routes/auth.go
                  start_line: 45
                  end_line: 45
                  suggestion: "return fmt.Errorf(\"authentication failed: invalid token format for user %s\", username)"
                  status: pending
                  change_id: null
                  created_at: "2024-01-15T11:00:00Z"
                  updated_at: "2024-01-15T11:00:00Z"
    post:
      summary: POST /repos/{owner}/{repo}/landings/{number}/suggestions
      description: Create a suggested change on a landing request. The suggestion proposes replacement code for specific lines in a file.
      operationId: post_repos__owner___repo__landings__number__suggestions
      tags:
        - Landings
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
        - name: number
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
                - start_line
                - end_line
                - suggestion
              properties:
                body:
                  type: string
                  description: Review comment text accompanying the suggestion
                path:
                  type: string
                  description: File path the suggestion applies to
                start_line:
                  type: integer
                  description: First line number being replaced
                end_line:
                  type: integer
                  description: Last line number being replaced
                suggestion:
                  type: string
                  description: Replacement code content
            example:
              body: The error message should be more descriptive.
              path: internal/routes/auth.go
              start_line: 45
              end_line: 45
              suggestion: "return fmt.Errorf(\"authentication failed: invalid token format for user %s\", username)"
      responses:
        '201':
          description: Suggestion created
          content:
            application/json:
              schema:
                type: object
              example:
                id: 7
                landing_number: 42
                author:
                  login: reviewer
                  id: 2
                body: The error message should be more descriptive.
                path: internal/routes/auth.go
                start_line: 45
                end_line: 45
                suggestion: "return fmt.Errorf(\"authentication failed: invalid token format for user %s\", username)"
                status: pending
                change_id: null
                created_at: "2024-01-15T11:00:00Z"
                updated_at: "2024-01-15T11:00:00Z"
        '404':
          description: Landing request not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: landing request not found
        '422':
          description: Invalid suggestion (e.g., line range out of bounds)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: Validation Failed
                errors:
                  - resource: Suggestion
                    field: end_line
                    code: invalid
