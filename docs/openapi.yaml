  /repos/{owner}/{repo}/statuses/{sha}:
    post:
      summary: POST /repos/{owner}/{repo}/statuses/{sha}
      description: Create or update a commit status for a specific commit SHA. If a status with the same context already exists on this SHA, it is replaced. Used by CI/CD systems, external tools, and workflows to report check results.
      operationId: post_repos__owner___repo__statuses__sha_
      tags:
        - Repos
      parameters:
        - name: owner
          in: path
          required: true
          description: Repository owner username or organization name
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: Repository name
          schema:
            type: string
        - name: sha
          in: path
          required: true
          description: Full commit SHA to attach the status to
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - state
              properties:
                state:
                  type: string
                  enum:
                    - pending
                    - success
                    - failure
                    - error
                  description: "Status state: pending (in progress), success (check passed), failure (check failed), error (infrastructure problem)"
                context:
                  type: string
                  description: Identifier for this check (default "default"). Must be unique per SHA.
                  default: default
                  example: ci/test
                description:
                  type: string
                  description: Human-readable summary of the result (max 255 characters)
                  maxLength: 255
                  example: All 142 tests passed
                target_url:
                  type: string
                  format: uri
                  description: URL to the full details of the check (e.g., workflow run logs)
                  example: https://api.jjhub.tech/alice/my-project/runs/87
            example:
              state: success
              context: ci/test
              description: All 142 tests passed
              target_url: https://api.jjhub.tech/alice/my-project/runs/87
      responses:
        '201':
          description: Commit status created or updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - state
                  - context
                  - created_at
                  - updated_at
                properties:
                  id:
                    type: integer
                    description: Unique status ID
                  state:
                    type: string
                    enum:
                      - pending
                      - success
                      - failure
                      - error
                  context:
                    type: string
                    description: Check identifier
                  description:
                    type: string
                    description: Human-readable summary
                  target_url:
                    type: string
                    format: uri
                    description: URL to check details
                  creator:
                    type: object
                    properties:
                      login:
                        type: string
                      id:
                        type: integer
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
              example:
                id: 1
                state: success
                context: ci/test
                description: All 142 tests passed
                target_url: https://api.jjhub.tech/alice/my-project/runs/87
                creator:
                  login: alice
                  id: 1
                created_at: "2025-01-15T10:35:00Z"
                updated_at: "2025-01-15T10:35:00Z"
        '400':
          description: Invalid request (missing required fields or invalid state value)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: Validation Failed
                errors:
                  - resource: CommitStatus
                    field: state
                    code: invalid
        '404':
          description: Repository or commit not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: Not Found
                errors: []
