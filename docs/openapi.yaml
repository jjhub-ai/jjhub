  /repos/{owner}/{repo}/commits/{ref}/statuses:
    get:
      summary: GET /repos/{owner}/{repo}/commits/{ref}/statuses
      description: List all commit statuses for a given ref (commit SHA, bookmark name, or change ID). Returns statuses sorted by creation date (newest first). Use this to check CI/CD results for a specific commit.
      operationId: get_repos__owner___repo__commits__ref__statuses
      tags:
        - Repos
      parameters:
        - name: owner
          in: path
          required: true
          description: Repository owner username or organization name
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: Repository name
          schema:
            type: string
        - name: ref
          in: path
          required: true
          description: Commit SHA, bookmark name, or jj change ID
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a previous response's next_cursor field
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of results to return (default 30, max 100)
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        '200':
          description: List of commit statuses
          headers:
            Link:
              description: RFC 8288 pagination links with cursor-based URLs.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - next_cursor
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - state
                        - context
                        - created_at
                        - updated_at
                      properties:
                        id:
                          type: integer
                          description: Unique status ID
                        state:
                          type: string
                          enum:
                            - pending
                            - success
                            - failure
                            - error
                          description: Status state
                        context:
                          type: string
                          description: Identifier for this status check (e.g., ci/test, ci/build)
                        description:
                          type: string
                          description: Human-readable summary (max 255 characters)
                        target_url:
                          type: string
                          format: uri
                          description: URL linking to the full check details
                        creator:
                          type: object
                          properties:
                            login:
                              type: string
                            id:
                              type: integer
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  next_cursor:
                    type: string
                    nullable: true
                    description: Opaque cursor for fetching the next page. Null when there are no more results.
              example:
                items:
