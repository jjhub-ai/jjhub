    put:
      summary: PUT /repos/{owner}/{repo}/landings/{number}/suggestions/accept-all
      description: Accept all pending suggestions on a landing request at once. Creates one new jj change per suggestion, or a single combined change if the squash query parameter is set.
      operationId: put_repos__owner___repo__landings__number__suggestions__accept_all
