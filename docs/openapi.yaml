openapi: 3.1.0
info:
  title: JJHub API
  version: 1.0.0
  description: API for JJHub - a jj-native development platform
servers:
  - url: https://api.jjhub.tech
paths:
  /auth/key/nonce:
    get:
      summary: GET /auth/key/nonce
      description: Generate a single-use nonce for the Sign in with Key flow.
      operationId: get_auth_key_nonce
      tags:
        - Authentication
      responses:
        '200':
          description: Sign in with Key nonce generated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - nonce
                properties:
                  nonce:
                    type: string
                    description: Single-use nonce to embed in the Sign in with Key message.
                    example: abc123
              example:
                nonce: abc123
        '500':
          description: Failed to create auth nonce
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: failed to create auth nonce
                errors: []
  /auth/key/verify:
    post:
      summary: POST /auth/key/verify
      description: Verify a signed message and create a JJHub browser session.
      operationId: post_auth_key_verify
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - signature
              properties:
                message:
                  type: string
                  description: Full Sign in with Key message that includes the server-issued nonce.
                  example: |-
                    jjhub.tech wants you to sign in with your key:
                    0x71C7656EC7ab88b098defB751B7401B5f6d8976F

                    Sign in to JJHub

                    URI: https://jjhub.tech
                    Version: 1
                    Chain ID: 1
                    Nonce: abc123
                    Issued At: 2026-03-07T12:00:00Z
                signature:
                  type: string
                  description: Hex-encoded signature for the Sign in with Key message.
                  example: 0x5f2c9ab1
            example:
              message: |-
                jjhub.tech wants you to sign in with your key:
                0x71C7656EC7ab88b098defB751B7401B5f6d8976F

                Sign in to JJHub

                URI: https://jjhub.tech
                Version: 1
                Chain ID: 1
                Nonce: abc123
                Issued At: 2026-03-07T12:00:00Z
              signature: 0x5f2c9ab1
      responses:
        '200':
          description: Signature verified and session created
          headers:
            Set-Cookie:
              description: Includes `jjhub_session` and `__csrf` cookies.
              schema:
                type: string
                example: jjhub_session=3f1f2f3f-8e4c-4e6d-9d3a-123456789abc; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    type: object
                    required:
                      - id
                      - username
                    properties:
                      id:
                        type: integer
                        format: int64
                        example: 42
                      username:
                        type: string
                        example: alice
              example:
                user:
                  id: 42
                  username: alice
        '400':
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: message and signature are required
                errors: []
        '401':
          description: Invalid signature or invalid / expired nonce
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: invalid or expired nonce
                errors: []
        '403':
          description: Account is suspended or access is not permitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: account is suspended
                errors: []
        '409':
          description: Wallet address conflicts with an existing account
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: wallet address is already in use
                errors: []
        '415':
          description: Request content type must be application/json
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: unsupported content type
                errors: []
        '429':
          description: Auth rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: rate limit exceeded
                errors: []
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: internal server error
                errors: []
  /auth/github:
    get:
      summary: GET /auth/github
      description: Start GitHub OAuth login. Sets an OAuth state cookie and redirects the browser to GitHub.
      operationId: get_auth_github
      tags:
        - Authentication
      responses:
        '302':
          description: Redirect to the GitHub OAuth authorization page
          headers:
            Location:
              description: GitHub OAuth authorization URL.
              schema:
                type: string
                format: uri
                example: https://github.com/login/oauth/authorize?client_id=abc123&state=state123&scope=read%3Auser+user%3Aemail
            Set-Cookie:
              description: OAuth state verifier cookie used to validate the callback.
              schema:
                type: string
                example: jjhub_oauth_state=8d3f4c2b; Path=/; HttpOnly; Secure; SameSite=Lax
        '429':
          description: Auth rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: rate limit exceeded
                errors: []
        '500':
          description: GitHub OAuth is not configured or state generation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: github oauth is not configured
                errors: []
  /auth/github/callback:
    get:
      summary: GET /auth/github/callback
      description: Complete GitHub OAuth login using the `code` and `state` query parameters returned by GitHub.
      operationId: get_auth_github_callback
      tags:
        - Authentication
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: GitHub OAuth completed and JJHub session created
          headers:
            Location:
              description: Post-login redirect target.
              schema:
                type: string
                example: /
            Set-Cookie:
              description: Includes `jjhub_session`, `__csrf`, and a clearing `jjhub_oauth_state` cookie.
              schema:
                type: string
                example: jjhub_session=3f1f2f3f-8e4c-4e6d-9d3a-123456789abc; Path=/; HttpOnly; Secure; SameSite=Strict
        '400':
          description: Missing query parameters or GitHub code exchange failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              examples:
                missingParams:
                  value:
                    message: code and state are required
                    errors: []
                exchangeFailed:
                  value:
                    message: failed to exchange github oauth code
                    errors: []
        '401':
          description: Invalid or replayed OAuth state
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: invalid oauth state
                errors: []
        '403':
          description: Account is suspended or access is not permitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: account is suspended
                errors: []
        '409':
          description: GitHub account email conflicts with an existing account
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: email address is already in use
                errors: []
        '429':
          description: Auth rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: rate limit exceeded
                errors: []
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
              example:
                message: internal server error
                errors: []
