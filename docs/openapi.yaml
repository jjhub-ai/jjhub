            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Suggestion accepted, new change created
          content:
            application/json:
              schema:
                type: object
              example:
                id: 7
                status: accepted
                change_id: kxyz1234abcd
                applied_at: "2024-01-15T11:05:00Z"
        '404':
